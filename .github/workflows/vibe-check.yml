# vibeguard:ignore
name: VibeGuard Code Quality
# vibeguard:ignore
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
# vibeguard:ignore
jobs:
  vibe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50  # Required for git history audit
      
      - name: Vibeguard - Backend
        uses: fabriziosalmi/vibe-check@v1.2.0
        with:
          directory: ./backend
          threshold: 600
          brutal_mode: false

      - name: Vibeguard - Lib
        uses: fabriziosalmi/vibe-check@v1.2.0
        with:
          directory: ./lib
          threshold: 600
          brutal_mode: false

      - name: Vibeguard - Infra
        uses: fabriziosalmi/vibe-check@v1.2.0
        with:
          directory: ./backend
          threshold: 600
          brutal_mode: false

      - name: Vibeguard - Test
        uses: fabriziosalmi/vibe-check@v1.2.0
        with:
          directory: ./backend
          threshold: 600
          brutal_mode: false
