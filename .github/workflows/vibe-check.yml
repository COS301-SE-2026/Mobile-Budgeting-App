# vibeguard:ignore
name: VibeGuard Code Quality
# vibeguard:ignore
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
# vibeguard:ignore
jobs:
  vibe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /assets/
            /test/
            /backend/
            /infra/
            /lib/
            !*.md
            !**/*.md

      - name: Remove Documentation
        run: |
          find . -name "*.md" -delete

      - name: Create VibeGuard config
        run: |
          cat > .vibeguardrc << 'EOF'
              {
                "ignore": [
                  "SEC01", "SEC02", "SEC03", "SEC04", "SEC05", "SEC06", "SEC07",
                  "SEC08", "SEC09", "SEC10", "SEC11", "SEC12",
                  "STB01", "STB02", "STB03", "STB07", "STB08", "STB10",
                  "MNT01", "MNT02", "MNT03", "MNT04", "MNT05", "MNT06", "MNT07",
                  "HYG01", "HYG02", "HYG03", "HYG04", "HYG05", "HYG06", "HYG07",
                  "SME01", "SME02", "SME03", "SME04", "SME05", "SME06", "SME07",
                  "SME08", "SME09", "SME10", "SME11",
                  "TST03", "TST04",
                  "PRF01", "PRF02", "PRF03", "PRF04",
                  "DOC01", "DOC02", "DOC03", "DOC04", "DOC05", "DOC06", "DOC07",
                  "DOC08", "DOC09",
                  "DEP01", "DEP02", "DEP03", "DEP04", "DEP05",
                  "VCS02", "VCS03", "VCS04", "VCS05", "VCS06", "VCS07",
                  "NAM01", "NAM02", "NAM03", "NAM04", "NAM05",
                  "UX01", "UX03", "UX04", "UX05", "UX06", "UX07", "UX08", "UX09",
                  "UX10", "UX12", "UX13", "UX14",
                  "RCT01", "RCT02", "RCT03", "RCT04", "RCT05",
                  "GIT03", "GIT05", "GIT06", "GIT07"
                ],
                "exclude_files": [
                  "node_modules/*",
                  "vendor/*",
                  "dist/*",
                  "build/*",
                  "*.min.js",
                  "*.min.css",
                  "*.lock",
                  "__pycache__/*",
                  ".venv/*",
                  "venv/*",
                  ".git/*",
                  "legacy/*",
                  "test/fixtures/*",
                  "*.g.dart",
                  "*.freezed.dart",
                  ".dart_tool/*"
                ]
              }
              EOF

      - name: Vibeguard
        uses: fabriziosalmi/vibe-check@a9894b814f9a9f85c75cde4c94e85fd4ce7d0e07
        with:
          threshold: 600
          brutal_mode: false
