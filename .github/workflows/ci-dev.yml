name: Dev CI

on:
  push:
    branches:
      - dev
      - newdev
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "Flutter/budgetit/**/*.g.dart"
      - "Flutter/budgetit/**/*.freezed.dart"
  pull_request:
    branches:
      - dev
      - newdev
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "Flutter/budgetit/**/*.g.dart"
      - "Flutter/budgetit/**/*.freezed.dart"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    outputs:
      coverage_lines: ${{ steps.coverage.outputs.lines }}
      coverage_branches: ${{ steps.coverage.outputs.branches }}
      coverage_functions: ${{ steps.coverage.outputs.functions }}
      has_integration_tests: ${{ steps.detect-tests.outputs.has_integration_tests }}
      has_sonar: ${{ steps.check-sonar.outputs.has_sonar }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Detect unimplemented integration tests
        id: detect-tests
        working-directory: Flutter/budgetit
        run: |
          has() { grep -rqlE 'testWidgets|test\(' "$1" 2>/dev/null && echo true || echo false; }
          echo "has_integration_tests=$(has test/integration)" >> "$GITHUB_OUTPUT"

      - name: Check SonarCloud secrets
        id: check-sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "has_sonar=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sonar=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-setup

      - name: Cache build_runner outputs
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: Flutter/budgetit/.dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('Flutter/budgetit/pubspec.lock') }}-${{ hashFiles('Flutter/budgetit/lib/**/*.dart') }}
          restore-keys: |
            build-runner-${{ runner.os }}-${{ hashFiles('Flutter/budgetit/pubspec.lock') }}-
            build-runner-${{ runner.os }}-

      - name: Dart Build Runner
        working-directory: Flutter/budgetit
        run: dart run build_runner build --delete-conflicting-outputs --build-filter="lib/**.dart" --build-filter="test/**.dart"

      - name: Dart Format
        working-directory: Flutter/budgetit
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Flutter Analyze
        working-directory: Flutter/budgetit
        continue-on-error: true
        run: flutter analyze

      - name: Unit tests
        working-directory: Flutter/budgetit
        run: |
          flutter test --coverage --concurrency=4 $(find test -name '*_test.dart' -not -path 'test/golden/*' -not -path 'test/performance/*' -not -path 'test/integration/*')

      - name: Coverage gate
        id: coverage
        working-directory: Flutter/budgetit
        run: python3 ../../scripts/coverage_gate.py --lcov-file coverage/lcov.info --output "$GITHUB_OUTPUT"

      - name: Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: Flutter/budgetit/coverage/lcov.info

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: flutter-ci
    if: needs.flutter-ci.outputs.has_sonar == 'true'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: coverage-report
          path: Flutter/budgetit/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b36c6da39549040e2d88c70d582e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: flutter-ci
    if: needs.flutter-ci.outputs.has_integration_tests == 'true'
    continue-on-error: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/flutter-setup
      - name: Integration Tests
        working-directory: Flutter/budgetit
        run: flutter test test/integration/
