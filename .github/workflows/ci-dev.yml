name: Dev CI

on:
  push:
    branches:
      - dev
      - newdev
  pull_request:
    branches:
      - dev
      - newdev

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

  detect:
    name: Detect unimplemented integration tests
    runs-on: ubuntu-latest
    needs: secret-scan
    outputs:
      has_integration_tests: ${{ steps.detect-tests.has_integration_tests}}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - id: detect-tests
        working-directory: Flutter/budgetit
        run: |
          has() { grep -rqlE 'testWidgets|test\(' "$1" 2>/dev/null && echo true || echo false; }
          echo "has_integration_tests=$(has test/integration)" >> "$GITHUB_OUTPUT"

  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    needs: secret-scan
    outputs:
      coverage_lines: ${{ steps.coverage.outputs.lines }}
      coverage_branches: ${{ steps.coverage.outputs.branches }}
      coverage_functions: ${{ steps.coverage.outputs.functions }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: ./.github/actions/flutter-setup

      - name: Dart Build Runner
        working-directory: Flutter/budgetit
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart Format
        working-directory: Flutter/budgetit
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Flutter Analyze
        working-directory: Flutter/budgetit
        continue-on-error: true
        run: flutter analyze

      - name: Unit tests
        working-directory: Flutter/budgetit
        run: |
          flutter test --coverage $(find test -name '*_test.dart' -not -path 'test/golden/*' -not -path 'test/performance/*' -not -path 'test/integration/*')

      - name: Coverage gate
        id: coverage
        working-directory: Flutter/budgetit
        run: python3 ../../scripts/coverage_gate.py --lcov-file coverage/lcov.info --output "$GITHUB_OUTPUT"

      - name: Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: Flutter/budgetit/coverage/lcov.info

  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has_sonar: ${{ steps.check.outputs.has_sonar }}
    steps:
      - id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "has_sonar=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sonar=false" >> "$GITHUB_OUTPUT"
          fi

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [flutter-ci, check-secrets]
    if: needs.check-secrets.outputs.has_sonar == "true"
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: coverage-report
          path: Flutter/budgetit/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b36c6da39549040e2d88c70d582e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [flutter-ci, detect]
    if: needs.detect.outputs.has_integration_tests == 'true'
    continue-on-error: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/flutter-setup
      - name: Integration Tests
        working-directory: Flutter/budgetit
        run: flutter test test/integration/
