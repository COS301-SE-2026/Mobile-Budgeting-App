name: Update Milestone Badges

on:
  issues:
    types: [opened, closed, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    name: Update README Milestone Badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Demo 1 milestone data
        uses: Beakyn/gha-get-milestone-data@v1.0.1
        id: milestone1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          milestone: 1

      - name: Get Demo 2 milestone data
        uses: Beakyn/gha-get-milestone-data@v1.0.1
        id: milestone2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          milestone: 2

      - name: Get Demo 3 milestone data
        uses: Beakyn/gha-get-milestone-data@v1.0.1
        id: milestone3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          milestone: 3

      - name: Get Demo 4 milestone data
        uses: Beakyn/gha-get-milestone-data@v1.0.1
        id: milestone4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          milestone: 4

      - name: Calculate completion percentages
        env:
          DATA1: ${{ steps.milestone1.outputs.data }}
          DATA2: ${{ steps.milestone2.outputs.data }}
          DATA3: ${{ steps.milestone3.outputs.data }}
          DATA4: ${{ steps.milestone4.outputs.data }}
        run: |
          python3 -c "
          import json, os
          for i in range(1, 5):
              d = json.loads(os.environ[f'DATA{i}'])
              c = d['closed_issues']
              t = c + d['open_issues']
              print(f'DEMO{i}_PCT={0.0 if t == 0 else c / t}')
          " >> $GITHUB_ENV

      - name: Generate and inject badges
        run: |
          python3 scripts/badges/generate_badges/milestones_generate.py \
            --demo1-percent "$DEMO1_PCT" \
            --demo2-percent "$DEMO2_PCT" \
            --demo3-percent "$DEMO3_PCT" \
            --demo4-percent "$DEMO4_PCT"

          python3 scripts/badges/generate_badges/milestones_inject.py \
            --readme-path README.md \
            --badge-path /tmp/demo_badges.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "Chore: Update Milestone Badges" &&
            git push
          )
