name: Flutter Setup
description: Gets the pub cache , installs Flutter and runs pub get
inputs:
  needs-java:
    description: Whether or not to setup up flutter with java , needed for Android builds
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Java
      if: inputs.needs-java == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Cache packages from pub
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: Set up flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.41.9"
        cache: true

    - name: Install dependencies
      shell: bash
      working-directory: Flutter/budgetit
      run: flutter pub get
