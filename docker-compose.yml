# Run 'make container-clean' to wipe and force fresh downloads.
volumes:
  gradle-cache:
  pub-cache:

x-base: &base
  image: budgetit-flutter:latest
  build:
    context: .
    dockerfile: Containerfile
  working_dir: /workspace/Flutter/budgetit
  volumes:
    - ./Flutter/budgetit:/workspace/Flutter/budgetit:z
    - gradle-cache:/root/.gradle:z
    - pub-cache:/root/.pub-cache:z
  environment:
    - ANDROID_SDK_ROOT=/opt/android-sdk
    - ANDROID_HOME=/opt/android-sdk
    - FLUTTER_SDK=/opt/flutter
    - GRADLE_USER_HOME=/root/.gradle
    - PUB_CACHE=/root/.pub-cache

services:
  # ── Interactive Android
  # ADB client in container connects to host ADB server at localhost:5037,
  # Run 'adb start-server' on the host before starting this service.
  # No X11/Wayland mounts here — use the dev-linux service for desktop runs.
  dev:
    <<: *base
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["dev"]
    environment:
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - ANDROID_HOME=/opt/android-sdk
      - FLUTTER_SDK=/opt/flutter
      - GRADLE_USER_HOME=/root/.gradle
      - PUB_CACHE=/root/.pub-cache
      - ADB_SERVER_SOCKET=tcp:localhost:5037
    volumes:
      - ./Flutter/budgetit:/workspace/Flutter/budgetit:z
      - gradle-cache:/root/.gradle:z
      - pub-cache:/root/.pub-cache:z

  # ── Interactive (Linux desktop)
  # Extends dev with X11/Wayland display forwarding for 'flutter run -d linux'.
  # Requires --security-opt label=disable because some container runtimes do not support relabeling /tmp/.X11-unix (a system socket owned by the X server).
  dev-linux:
    <<: *base
    network_mode: host
    stdin_open: true
    tty: true
    security_opt:
      - label:disable
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["dev"]
    environment:
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - ANDROID_HOME=/opt/android-sdk
      - FLUTTER_SDK=/opt/flutter
      - GRADLE_USER_HOME=/root/.gradle
      - PUB_CACHE=/root/.pub-cache
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/1000}
      - ADB_SERVER_SOCKET=tcp:localhost:5037
    volumes:
      - ./Flutter/budgetit:/workspace/Flutter/budgetit:z
      - gradle-cache:/root/.gradle:z
      - pub-cache:/root/.pub-cache:z
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:${XDG_RUNTIME_DIR:-/run/user/1000}

  # ── Build services (artifacts appear on host via bind mount)
  # All output lands in Flutter/budgetit/build/ on the host automatically
  build-apk:
    <<: *base
    command: >
      sh -c "flutter pub get &&
             flutter build apk --release &&
             echo 'Output: build/app/outputs/flutter-apk/app-release.apk'"

  build-aab:
    <<: *base
    command: >
      sh -c "flutter pub get &&
             flutter build appbundle --release &&
             echo 'Output: build/app/outputs/bundle/release/app-release.aab'"

  build-web:
    <<: *base
    command: >
      sh -c "flutter pub get &&
             flutter build web --release &&
             echo 'Output: build/web/'"

  build-linux:
    <<: *base
    command: >
      sh -c "flutter pub get &&
             flutter build linux --release &&
             echo 'Output: build/linux/x64/release/bundle/'"

  test:
    <<: *base
    command: >
      sh -c "flutter pub get &&
             flutter test --reporter=expanded"
