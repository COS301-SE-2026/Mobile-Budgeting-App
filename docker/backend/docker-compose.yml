services:
  backend-api:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      args:
        - PYTHON_IMAGE=${PYTHON_IMAGE:-python:3.12-slim}
        - APP_HOST=${APP_HOST:-0.0.0.0}
        - APP_PORT=${APP_PORT:-8000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ../../backend/src:/app/src
    env_file:
      - ../../backend/.env
    networks:
      - budgetit-net

networks:
  budgetit-net:
    name: ${NETWORK_NAME:-budgetit-net}
